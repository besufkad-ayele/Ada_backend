services:
  - type: web
    name: kuraz-ai-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: RESORT_NAME
        value: Tana Lakeside Resort
      - key: RESORT_TOTAL_ROOMS
        value: 120
