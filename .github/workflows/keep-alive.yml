name: Keep Render Backend Alive

on:
  schedule:
    # Run every 14 minutes (before 15-minute Render timeout)
    - cron: '*/14 * * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Health Endpoint
        run: |
          echo "🔄 Pinging Kuraz AI backend..."
          response=$(curl -s -o /dev/null -w "%{http_code}" https://ada-backend-2tk9.onrender.com/api/health)
          
          if [ $response -eq 200 ]; then
            echo "✅ Backend is alive (HTTP $response)"
          else
            echo "⚠️ Unexpected response (HTTP $response)"
            exit 1
          fi
      
      - name: Log Timestamp
        run: echo "⏰ Last ping at $(date -u)"
